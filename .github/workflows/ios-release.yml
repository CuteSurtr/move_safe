name: iOS Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build + attach simulator artifact
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build for iOS Simulator
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project MoveSafe.xcodeproj \
            -scheme MoveSafe \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package .app as zip
        id: package
        run: |
          set -e
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name MoveSafe.app -path '*Build/Products/Release-iphonesimulator*' | head -1)
          if [ -z "$APP" ]; then
            echo "::error::Built MoveSafe.app not found"
            exit 1
          fi
          TAG="${GITHUB_REF_NAME:-manual-$(date +%Y%m%d-%H%M%S)}"
          ZIP="MoveSafe-${TAG}-iphonesimulator.zip"
          (cd "$(dirname "$APP")" && zip -r -y "$RUNNER_TEMP/$ZIP" "$(basename "$APP")")
          echo "zip_path=$RUNNER_TEMP/$ZIP" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP" >> "$GITHUB_OUTPUT"
          ls -lh "$RUNNER_TEMP/$ZIP"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error

      - name: Create GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip_path }}
          body: |
            Simulator-only build (Release configuration, unsigned).

            This artifact is a SwiftUI app bundle built for the iOS
            Simulator. It is NOT code-signed and CANNOT be installed on a
            physical iPhone. To run it:

            1. Unzip MoveSafe.app
            2. Boot any iOS 17+ simulator: `xcrun simctl boot <UDID>`
            3. Install: `xcrun simctl install booted MoveSafe.app`
            4. Launch: `xcrun simctl launch booted com.movesafe.ios`

            For installation on a real device, the project needs to be
            built with a valid Apple Developer team and signing identity.
