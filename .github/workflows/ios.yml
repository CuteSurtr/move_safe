name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build for iOS Simulator
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project MoveSafe.xcodeproj \
            -scheme MoveSafe \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Locate built .app
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name MoveSafe.app -path '*Build/Products/Debug-iphonesimulator*' | head -1)
          echo "Built: $APP"
          du -sh "$APP"

  test:
    name: Unit tests (engine)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Pick a concrete iPhone simulator
        id: sim
        run: |
          # The macos-15 image rotates the default simulator name. Pick whatever
          # iPhone is installed so the test step does not break on image refresh.
          DEST=$(xcrun simctl list devices available | grep -E 'iPhone [0-9]+ ' | head -1 | sed -E 's/^[[:space:]]+([^ ]+ [^ ]+).*/\1/')
          if [ -z "$DEST" ]; then
            DEST=$(xcrun simctl list devices available | grep -E 'iPhone' | head -1 | sed -E 's/^[[:space:]]+([^(]+) \(.*$/\1/' | sed 's/[[:space:]]*$//')
          fi
          echo "Picked: $DEST"
          echo "name=$DEST" >> "$GITHUB_OUTPUT"

      - name: Run tests
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project MoveSafe.xcodeproj \
            -scheme MoveSafe \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=latest" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            test

  em-dash-lint:
    name: Em-dash lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Fail if any tracked file contains an em dash
        run: |
          # The em dash (U+2014) is constructed via printf so this workflow
          # file itself does not contain the literal character and therefore
          # passes its own lint.
          EM_DASH=$(printf '\xe2\x80\x94')
          if git ls-files | xargs grep -lF "$EM_DASH" 2>/dev/null; then
            echo "::error::Em dash (U+2014) found in tracked files. Use a hyphen-minus instead."
            git ls-files | xargs grep -nF "$EM_DASH" 2>/dev/null || true
            exit 1
          fi
          echo "OK: no em dashes."

  safe-copy-lint:
    name: Safe-copy lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Fail if iOS sources contain forbidden phrases (English + Spanish)
        run: |
          # The product's safety philosophy forbids legal-conclusion language
          # in user-facing copy. This lint enforces a high-confidence subset
          # of the forbidden phrases listed in
          # ios/Sources/MoveSafe/Utils/SafeCopy.swift. We scope to seed data,
          # views, and translation tables (which carry user-facing strings),
          # and exclude SafeCopy.swift itself (it documents the avoid list
          # by design).
          #
          # Skipped from the EN regex: "you can" / "you cannot" -- both have
          # legitimate UX hint uses (e.g., "you can change these later") that
          # would false-positive.
          #
          # Spanish equivalents are tuned to the same intent: avoid words that
          # imply a legal conclusion. "puedes/no puedes" intentionally excluded
          # for the same UX-hint reason as the English "you can".
          EN='\b(illegal|permitted|prohibited|guaranteed)\b|avoid penalties'
          ES='\b(ilegal|permitido|prohibido|garantizado)\b|para evitar (sanciones|multas)'
          PHRASES="$EN|$ES"
          if MATCHES=$(git grep -nEiI -- "$PHRASES" \
                ios/Sources/MoveSafe/Data \
                ios/Sources/MoveSafe/Views \
                ios/Sources/MoveSafe/Localization \
                ':!ios/Sources/MoveSafe/Utils/SafeCopy.swift'); then
            echo "::error::Forbidden safe-copy phrases found in iOS sources (English or Spanish):"
            printf '%s\n' "$MATCHES"
            echo ""
            echo "If a match is a legitimate use, rephrase using 'verify' / 'check' /"
            echo "'may apply' / 'rules differ' / 'do not assume' (or their Spanish equivalents:"
            echo "'verificar' / 'consultar' / 'puede aplicar' / 'las normas difieren' / 'no asuma')."
            exit 1
          fi
          echo "OK: no forbidden safe-copy phrases in English or Spanish."

  schema-integrity:
    name: Schema integrity (iOS seed data)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Verify ChecklistItem references resolve
        run: |
          python3 <<'PY'
          import re, sys, pathlib

          ROOT = pathlib.Path('ios/Sources/MoveSafe/Data')

          def all_ids(path: pathlib.Path) -> set[str]:
              # Every Source / Category / Purpose declaration uses `id: "..."`
              # as its first field. Sources.swift also accepts an `id` slot
              # inside `StateUrlBinding(...)`, but that takes an enum literal
              # (`.destination` etc.) not a string, so the regex naturally
              # ignores it.
              text = path.read_text()
              return set(re.findall(r'id:\s*"([^"]+)"', text))

          defined_categories = all_ids(ROOT / 'Categories.swift')
          defined_purposes   = all_ids(ROOT / 'Purposes.swift')
          defined_sources    = all_ids(ROOT / 'Sources.swift')

          items_text = (ROOT / 'ChecklistItems.swift').read_text()

          # Build the set of item IDs so we don't false-positive on the item's
          # own `id: "..."` line when scanning string literals.
          item_ids = set(re.findall(r'^\s*id:\s*"([^"]+)"', items_text, re.MULTILINE))

          # categoryId is always a single string literal.
          ref_categories = set(re.findall(r'categoryId:\s*"([^"]+)"', items_text))

          # appliesToPurposes and sourceIds are array literals. Pull each block
          # and extract the string literals inside.
          def refs_inside(field: str) -> set[str]:
              out: set[str] = set()
              for m in re.finditer(rf'{field}:\s*\[([^\]]*)\]', items_text, re.DOTALL):
                  out.update(re.findall(r'"([^"]+)"', m.group(1)))
              return out

          ref_purposes = refs_inside('appliesToPurposes')
          ref_sources  = refs_inside('sourceIds')

          missing_categories = ref_categories - defined_categories
          missing_purposes   = ref_purposes   - defined_purposes
          missing_sources    = ref_sources    - defined_sources

          errors = []
          if missing_categories:
              errors.append(f"Unknown categoryId values: {sorted(missing_categories)}")
          if missing_purposes:
              errors.append(f"Unknown purpose IDs in appliesToPurposes: {sorted(missing_purposes)}")
          if missing_sources:
              errors.append(f"Unknown source IDs in sourceIds: {sorted(missing_sources)}")

          unused_categories = defined_categories - ref_categories
          unused_purposes   = defined_purposes   - ref_purposes
          unused_sources    = defined_sources    - ref_sources

          print(f"Defined: {len(defined_categories)} categories, "
                f"{len(defined_purposes)} purposes, "
                f"{len(defined_sources)} sources")
          print(f"Items declared: {len(item_ids)}")
          print(f"Referenced by items: {len(ref_categories)} categories, "
                f"{len(ref_purposes)} purposes, "
                f"{len(ref_sources)} sources")
          if unused_categories:
              print(f"::warning::Unused categories: {sorted(unused_categories)}")
          if unused_purposes:
              print(f"::warning::Unused purposes:   {sorted(unused_purposes)}")
          if unused_sources:
              print(f"::warning::Unused sources:    {sorted(unused_sources)}")

          if errors:
              print("::error::Schema integrity check failed")
              for e in errors:
                  print(e)
              sys.exit(1)
          print("OK: all ChecklistItem references resolve.")
          PY
