name: MoveSafe
options:
  bundleIdPrefix: com.movesafe
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  MoveSafe:
    type: application
    platform: iOS
    sources:
      - Sources/MoveSafe
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        "INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad": "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        PRODUCT_BUNDLE_IDENTIFIER: com.movesafe.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

  MoveSafeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/MoveSafeTests
    dependencies:
      - target: MoveSafe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.movesafe.ios.tests
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MoveSafe.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MoveSafe"

schemes:
  MoveSafe:
    build:
      targets:
        MoveSafe: all
        MoveSafeTests: [test]
    test:
      targets:
        - MoveSafeTests
